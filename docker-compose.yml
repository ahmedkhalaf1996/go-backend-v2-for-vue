version: '3'
services:
  redis:
    container_name: redis 
    image: redis:7.0-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data 
    networks:
      - app-network
    command: redis-server --appendonly yes 

volumes:
  redis-data:
    driver: local
networks:
  app-network:
    driver: bridge

